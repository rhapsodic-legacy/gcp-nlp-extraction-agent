version: "3.9"

services:
  agent-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PORT=8080
    volumes:
      - ./data:/app/data:ro

  dashboard:
    build: .
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./data:/app/data:ro
    command: streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
